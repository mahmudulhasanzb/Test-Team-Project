<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .login-container {
      width: 100%;
      height: 100vh;
      background-color: gray;
    }
    .login-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
    }
    .login-title {
      font-size: 48px;
      font-weight: bold;
      color: white;
      margin-bottom: 20px;
      text-align: center;
    }
    .login-description {
      font-size: 24px;
      margin-bottom: 20px;
      color: white;
      text-align: center;
      padding-left: 100px;
      padding-right: 100px;
    }
    .login-btn {
      padding: 12px 24px;
      background-color: #3498db;
      color: white;
      border-radius: 6px;
      text-decoration: none;
    }
    .login-btn:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-content">
      <h1 class="login-title">Login</h1>
      <p class="login-description">Login description</p>
      <a href="#" class="btn login-btn">Login button</a>
    </div>
  </div>
</body>
</html>
